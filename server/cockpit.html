<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Coding Cockpit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 { font-size: 14px; color: #58a6ff; letter-spacing: 1px; }

    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #444; flex-shrink: 0;
    }
    #status-dot.connected { background: #3fb950; }
    #status-dot.connecting { background: #d29922; }
    #status-dot.error { background: #f85149; }

    #status-text { font-size: 12px; color: #8b949e; }

    #connect-btn {
      margin-left: auto;
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #connect-btn:hover { background: #30363d; }
    #connect-btn.active { border-color: #f85149; color: #f85149; }

    #mic-indicator {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
    }
    #mic-indicator.speaking {
      border-color: #3fb950;
      color: #3fb950;
      background: #0d2a13;
    }

    #voice-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      cursor: pointer;
      font-family: inherit;
      user-select: none;
      white-space: nowrap;
    }
    #voice-btn:hover { background: #30363d; }
    #voice-btn.active-cartesia {
      border-color: #a371f7;
      color: #a371f7;
      background: #1a0e2e;
    }
    #voice-btn.active-openai {
      border-color: #3fb950;
      color: #3fb950;
      background: #0d2a13;
    }
    #voice-btn.active-kokoro {
      border-color: #e3b341;
      color: #e3b341;
      background: #2a1f00;
    }
    #voice-btn:disabled { opacity: 0.4; cursor: default; }

    .pane-btn {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .pane-btn:hover { background: #30363d; color: #c9d1d9; }
    .pane-btn:disabled { opacity: 0.4; cursor: default; }

    #chat-header, #term-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      flex-shrink: 0;
    }
    #chat-header .pane-label, #term-header .pane-label {
      font-size: 10px;
      color: #484f58;
      letter-spacing: 1px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
    }

    #chat-col {
      display: flex;
      flex-direction: column;
      width: 40%;
      min-width: 0;
      overflow: hidden;
    }

    #divider {
      width: 5px;
      background: #30363d;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
      position: relative;
    }
    #divider:hover, #divider.dragging { background: #58a6ff; }

    #term-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #0d1117;
      overflow: hidden;
    }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1f3d5c;
      border: 1px solid #1f6feb;
      color: #cae8ff;
    }

    .msg.bot {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
    }

    .msg.bot .sender {
      font-size: 10px;
      color: #3fb950;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .msg.user .sender {
      font-size: 10px;
      color: #58a6ff;
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-align: right;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      border: none;
      color: #484f58;
      font-size: 11px;
    }

    #input-row {
      border-top: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      gap: 8px;
    }

    #text-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
    }
    #text-input:focus { border-color: #58a6ff; }

    #send-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #send-btn:hover { background: #30363d; }

    /* scrollbar */
    #conversation::-webkit-scrollbar { width: 6px; }
    #conversation::-webkit-scrollbar-track { background: #0d1117; }
    #conversation::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* two-column main layout */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* column layout handled in the block above */

    #term-frame {
      flex: 1;
      border: none;
      background: #000;
    }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>VOICE CODING COCKPIT</h1>
  <span id="status-text">disconnected</span>
  <span id="mic-indicator">🎙 mic off</span>
  <button id="voice-btn" disabled title="Cycle: Voice Off → Cartesia → OpenAI → Kokoro">🔇 Voice Off</button>
  <button class="pane-btn" id="reset-view-btn" title="Reset to 40/60 split">⊞ Reset view</button>
  <button id="connect-btn">Connect</button>
</header>

<div id="main">

  <!-- left: conversation + input -->
  <div id="chat-col">
    <div id="chat-header">
      <span class="pane-label">CONTROLLER</span>
      <button class="pane-btn" id="clear-btn" title="Clear conversation">✕ Clear</button>
    </div>
    <div id="conversation">
      <div class="msg system">Connect to start — speak or type your instruction.</div>
    </div>
    <div id="input-row">
      <input id="text-input" type="text" placeholder="Type a message and press Enter…" disabled />
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <!-- drag handle -->
  <div id="divider"></div>

  <!-- right: live terminal via ttyd -->
  <div id="term-col">
    <div id="term-header">
      <span class="pane-label">TERMINAL · tmux cockpit</span>
      <button class="pane-btn" id="reset-btn" disabled title="Reset terminal session">↺ Reset</button>
    </div>
    <iframe id="term-frame" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
  </div>

</div>

<!-- hidden audio element — needed so the browser lets WebRTC audio through, even if muted -->
<audio id="bot-audio" autoplay muted></audio>

<script>
  const statusDot    = document.getElementById('status-dot');
  const statusText   = document.getElementById('status-text');
  const connectBtn   = document.getElementById('connect-btn');
  const micLabel     = document.getElementById('mic-indicator');
  const voiceBtn     = document.getElementById('voice-btn');
  const conv         = document.getElementById('conversation');
  const textInput    = document.getElementById('text-input');
  const sendBtn      = document.getElementById('send-btn');
  const botAudio     = document.getElementById('bot-audio');
  const clearBtn     = document.getElementById('clear-btn');
  const resetBtn     = document.getElementById('reset-btn');
  const resetViewBtn = document.getElementById('reset-view-btn');
  const chatCol      = document.getElementById('chat-col');
  const termCol      = document.getElementById('term-col');
  const divider      = document.getElementById('divider');
  const mainEl       = document.getElementById('main');

  let pc = null;
  let dc = null;
  let pcId = null;
  let micStream = null;

  // Voice state: 'off' | 'cartesia' | 'openai' | 'kokoro'
  let voiceMode = 'off';
  const VOICE_CYCLE = ['off', 'cartesia', 'openai', 'kokoro'];

  // Current bot bubble — accumulated across sentences in one turn
  let botBubbleBody = null;

  // ── UI helpers ─────────────────────────────────────────────────────────────

  function setStatus(state, text) {
    statusDot.className = state;
    statusText.textContent = text;
  }

  function addMsg(role, text) {
    // Remove the placeholder "Connect to start" system msg on first real msg
    const placeholder = conv.querySelector('.msg.system');
    if (placeholder) placeholder.remove();

    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = role === 'user' ? 'YOU' : 'CONTROLLER';
    wrap.appendChild(sender);

    const body = document.createElement('div');
    body.textContent = text;
    wrap.appendChild(body);

    conv.appendChild(wrap);
    conv.scrollTop = conv.scrollHeight;
    return body;
  }

  function startBotTurn() {
    // Create a new empty bot bubble; sentences will be appended into it
    const body = addMsg('bot', '');
    botBubbleBody = body;
  }

  function appendBotSentence(text) {
    if (!botBubbleBody) startBotTurn();
    const current = botBubbleBody.textContent;
    botBubbleBody.textContent = current ? current + ' ' + text.trim() : text.trim();
    conv.scrollTop = conv.scrollHeight;
  }

  function endBotTurn() {
    botBubbleBody = null;
  }

  function addSystem(text) {
    const el = document.createElement('div');
    el.className = 'msg system';
    el.textContent = text;
    conv.appendChild(el);
    conv.scrollTop = conv.scrollHeight;
  }

  const VOICE_LABELS = { off: '🔇 Voice Off', cartesia: '🔵 Cartesia', openai: '🟢 OpenAI', kokoro: '🟡 Kokoro' };

  function applyVoiceMode(mode, reason = '', announce = true) {
    voiceMode = mode;
    const enabled = mode !== 'off';
    voiceBtn.className = enabled ? `active-${mode}` : '';
    voiceBtn.textContent = VOICE_LABELS[mode] || '🔇 Voice Off';
    botAudio.muted = !enabled;
    if (announce && reason) addSystem(reason);
  }

  function sendVoiceMode(mode) {
    if (!dc || dc.readyState !== 'open') return;
    const enabled = mode !== 'off';
    dc.send(JSON.stringify({
      label: 'rtvi-ai', type: 'client-message', id: `tts-${Date.now()}`,
      data: { t: 'tts-toggle', d: { enabled } },
    }));
    if (enabled) {
      dc.send(JSON.stringify({
        label: 'rtvi-ai', type: 'client-message', id: `tts-prov-${Date.now()}`,
        data: { t: 'tts-provider', d: { provider: mode } },
      }));
    }
  }

  // ── WebRTC connection ───────────────────────────────────────────────────────

  async function connect() {
    setStatus('connecting', 'connecting…');
    connectBtn.textContent = 'Connecting…';
    connectBtn.disabled = true;

    try {
      // Mic audio — send to server for Deepgram STT
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

      pc = new RTCPeerConnection();

      // Add mic track — this is the STT path; do NOT touch this
      for (const track of micStream.getTracks()) {
        pc.addTrack(track, micStream);
      }

      // Receive bot audio (TTS) — play it (muted by default in this UI)
      pc.ontrack = (evt) => {
        if (evt.track.kind === 'audio') {
          botAudio.srcObject = evt.streams[0];
        }
      };

      // Data channel — RTVI messages travel here
      dc = pc.createDataChannel('pipecat');

      dc.onopen = () => {
        setStatus('connected', 'connected');
        connectBtn.textContent = 'Disconnect';
        connectBtn.classList.add('active');
        connectBtn.disabled = false;
        textInput.disabled = false;
        sendBtn.disabled = false;
        resetBtn.disabled = false;
        voiceBtn.disabled = false;
        applyVoiceMode('off', '', false);
        sendVoiceMode('off');
        addSystem('Connected. Waiting for controller greeting…');
        termPolling = true;
        pollTerminal();
      };

      dc.onmessage = (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          handleRTVI(msg);
        } catch (_) {}
      };

      dc.onclose = () => onDisconnected('data channel closed');

      // SDP offer → server
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering to complete
      await new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') { resolve(); return; }
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') resolve();
        };
      });

      const resp = await fetch('/api/offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type,
        }),
      });

      if (!resp.ok) throw new Error(`Server returned ${resp.status}`);

      const answer = await resp.json();
      pcId = answer.pc_id;
      await pc.setRemoteDescription({ sdp: answer.sdp, type: answer.type });

    } catch (err) {
      setStatus('error', 'error');
      addSystem(`Connection failed: ${err.message}`);
      connectBtn.textContent = 'Connect';
      connectBtn.disabled = false;
      cleanup();
    }
  }

  function onDisconnected(reason) {
    setStatus('', 'disconnected');
    connectBtn.textContent = 'Connect';
    connectBtn.classList.remove('active');
    connectBtn.disabled = false;
    textInput.disabled = true;
    sendBtn.disabled = true;
    micLabel.className = '';
    micLabel.textContent = '🎙 mic off';
    resetBtn.disabled = true;
    voiceBtn.disabled = true;
    applyVoiceMode('off', '', false);
    termPolling = false;
    termFrame.src = 'about:blank';
    addSystem(`Disconnected${reason ? ': ' + reason : ''}.`);
    cleanup();
  }

  function cleanup() {
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (dc) { try { dc.close(); } catch(_){} dc = null; }
    if (pc) { try { pc.close(); } catch(_){} pc = null; }
    pcId = null;
  }

  async function disconnect() {
    if (pcId) {
      try {
        await fetch('/api/offer', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pc_id: pcId, type: 'session.close' }),
        });
      } catch(_) {}
    }
    onDisconnected('user disconnected');
  }

  // ── RTVI message handler ────────────────────────────────────────────────────

  function handleRTVI(msg) {
    if (msg.label !== 'rtvi-ai') return;

    switch (msg.type) {
      case 'user-transcription':
        if (msg.data?.final) {
          addMsg('user', msg.data.text);
        }
        break;

      case 'bot-llm-started':
        startBotTurn();
        break;

      case 'bot-transcription':
        appendBotSentence(msg.data?.text || '');
        break;

      case 'bot-llm-stopped':
        endBotTurn();
        break;

      case 'user-started-speaking':
        micLabel.className = 'speaking';
        micLabel.textContent = '🎙 speaking…';
        break;

      case 'user-stopped-speaking':
        micLabel.className = '';
        micLabel.textContent = '🎙 listening';
        break;

      case 'bot-ready':
        addSystem('Controller ready.');
        break;

      case 'server-message':
        if (msg.data?.type === 'tts-status') {
          const reason = msg.data.reason || '';
          const shouldAnnounce = reason && reason !== 'Text-only mode is active.';
          const mode = msg.data.enabled ? (msg.data.provider || 'cartesia') : 'off';
          applyVoiceMode(mode, reason, shouldAnnounce);
        }
        break;

      default:
        break;
    }
  }

  // ── Send typed text via data channel as RTVI user message ──────────────────

  function sendText() {
    const text = textInput.value.trim();
    if (!text || !dc || dc.readyState !== 'open') return;

    // Send as RTVI user message so the server LLM processes it
    dc.send(JSON.stringify({
      label: 'rtvi-ai',
      type: 'user-llm-text',
      data: { text },
    }));

    addMsg('user', text);
    textInput.value = '';
  }

  // ── Terminal polling — load iframe once ttyd is ready ──────────────────────

  const termFrame = document.getElementById('term-frame');
  let termPolling = false;

  function pollTerminal() {
    if (!termPolling) return;
    fetch('/terminal')
      .then(r => {
        if (!termPolling) return;
        if (r.ok) {
          termFrame.src = 'about:blank';
          setTimeout(() => { if (termPolling) termFrame.src = '/terminal'; }, 50);
        } else {
          setTimeout(pollTerminal, 600);
        }
      })
      .catch(() => { if (termPolling) setTimeout(pollTerminal, 600); });
  }

  // ── Clear chat ──────────────────────────────────────────────────────────────

  clearBtn.addEventListener('click', () => {
    conv.innerHTML = '';
    botBubbleBody = null;
  });

  // ── Reset terminal ──────────────────────────────────────────────────────────

  resetBtn.addEventListener('click', async () => {
    resetBtn.disabled = true;
    resetBtn.textContent = '↺ …';
    try {
      await fetch('/api/reset-terminal', { method: 'POST' });
    } catch(_) {}
    termFrame.src = 'about:blank';
    setTimeout(() => {
      if (termPolling) termFrame.src = '/terminal';
      resetBtn.textContent = '↺ Reset';
      resetBtn.disabled = false;
    }, 1200);
  });

  // ── Draggable divider ───────────────────────────────────────────────────────

  function setSplit(pct) {
    // pct = chat column width as percentage of #main (0–100)
    pct = Math.max(0, Math.min(100, pct));
    chatCol.style.width = pct + '%';
    chatCol.style.flex = 'none';
    termCol.style.flex = pct >= 100 ? '0' : '1';
  }

  resetViewBtn.addEventListener('click', () => setSplit(40));

  divider.addEventListener('mousedown', (e) => {
    e.preventDefault();
    divider.classList.add('dragging');
    // Prevent the terminal iframe from swallowing mouse events during drag
    const termFrame = termCol.querySelector('iframe');
    if (termFrame) termFrame.style.pointerEvents = 'none';
    document.body.style.userSelect = 'none';
    const rect = mainEl.getBoundingClientRect();

    function onMove(e) {
      const x = e.clientX - rect.left;
      const pct = (x / rect.width) * 100;
      setSplit(pct);
    }
    function onUp() {
      divider.classList.remove('dragging');
      if (termFrame) termFrame.style.pointerEvents = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // ── Event listeners ─────────────────────────────────────────────────────────

  connectBtn.addEventListener('click', () => {
    if (pc) { disconnect(); } else { connect(); }
  });

  sendBtn.addEventListener('click', sendText);

  voiceBtn.addEventListener('click', () => {
    const next = VOICE_CYCLE[(VOICE_CYCLE.indexOf(voiceMode) + 1) % VOICE_CYCLE.length];
    applyVoiceMode(next, '', false);
    sendVoiceMode(next);
  });

  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  // ── Phase 1: Doc Mode State-Reducer ────────────────────────────────────────
  // The server is authoritative for state; the browser reflects it via these events.
  // cockpit.html dispatches actions; reducers update _docState and trigger UI changes.

  const _docState = { mode: 'shell', projectSlug: null, version: null };

  const _docReducers = {
    'doc-mode-entered': (state, payload) => ({
      ...state,
      mode: 'doc_mode',
      projectSlug: payload.project_slug,
      version: payload.version,
    }),
    'doc-mode-exited': (state, _payload) => ({
      ...state,
      mode: 'shell',
      projectSlug: null,
      version: null,
    }),
  };

  function docDispatch(action, payload = {}) {
    const reducer = _docReducers[action];
    if (!reducer) return;
    Object.assign(_docState, reducer({ ..._docState }, payload));
    _applyDocUI();
  }

  function _applyDocUI() {
    // Phase 1 placeholder — just update a status indicator if present.
    const indicator = document.getElementById('doc-mode-indicator');
    if (!indicator) return;
    if (_docState.mode === 'doc_mode') {
      indicator.textContent = `📄 Doc Mode — ${_docState.projectSlug} v${_docState.version}`;
      indicator.style.display = 'inline';
    } else {
      indicator.textContent = '';
      indicator.style.display = 'none';
    }
  }

  // Hook into existing server-message handler
  const _origServerMessage = window._onServerMessage;
  window._onServerMessage = function(msg) {
    if (_origServerMessage) _origServerMessage(msg);
    const t = (msg && msg.data && msg.data.type) ? msg.data.type : (msg && msg.type);
    if (t === 'doc-mode-entered') docDispatch('doc-mode-entered', msg.data || msg);
    if (t === 'doc-mode-exited')  docDispatch('doc-mode-exited', {});
  };
</script>
</body>
</html>
