<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Coding Cockpit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 { font-size: 14px; color: #58a6ff; letter-spacing: 1px; }

    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #444; flex-shrink: 0;
    }
    #status-dot.connected { background: #3fb950; }
    #status-dot.connecting { background: #d29922; }
    #status-dot.error { background: #f85149; }

    #status-text { font-size: 12px; color: #8b949e; }

    #doc-mode-indicator {
      font-size: 12px;
      color: #f0883e;
      background: #2d1f0e;
      border: 1px solid #7d4e1f;
      border-radius: 4px;
      padding: 2px 8px;
      display: none;
    }

    #doc-mode-overlay {
      display: none;
      position: fixed;
      width: 80vw;
      height: 80vh;
      left: 10vw;
      top: 10vh;
      background: #0d1117;
      border: 2px solid #f0883e;
      border-radius: 4px;
      z-index: 100;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #doc-mode-overlay.active { display: flex; }

    #doc-overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 14px;
      background: #161b22;
      border-bottom: 1px solid #f0883e;
      flex-shrink: 0;
      cursor: grab;
      user-select: none;
    }
    #doc-overlay-header:active {
      cursor: grabbing;
    }
    #doc-mode-overlay-label {
      font-size: 12px;
      font-weight: bold;
      color: #f0883e;
      letter-spacing: 1px;
    }
    #doc-mode-overlay-project {
      font-size: 11px;
      color: #d18b5a;
    }

    #doc-overlay-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      min-height: 0;
    }
    #doc-overlay-content::-webkit-scrollbar { width: 6px; }
    #doc-overlay-content::-webkit-scrollbar-track { background: #0d1117; }
    #doc-overlay-content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    #doc-overlay-text {
      font-size: 13px;
      line-height: 1.7;
      color: #c9d1d9;
      margin: 0;
    }
    #doc-overlay-text.empty {
      color: #484f58;
      font-style: italic;
    }
    #doc-overlay-text h1, #doc-overlay-text h2, #doc-overlay-text h3 {
      color: #58a6ff;
      margin: 1em 0 0.4em;
      font-size: 1em;
      letter-spacing: 0.5px;
    }
    #doc-overlay-text h1 { font-size: 1.2em; }
    #doc-overlay-text h2 { font-size: 1.05em; border-bottom: 1px solid #30363d; padding-bottom: 3px; }
    #doc-overlay-text p { margin: 0.5em 0; }
    #doc-overlay-text ul, #doc-overlay-text ol { padding-left: 1.4em; margin: 0.4em 0; }
    #doc-overlay-text li { margin: 0.2em 0; }
    #doc-overlay-text code { background: #21262d; padding: 1px 5px; border-radius: 3px; font-family: inherit; font-size: 0.92em; }
    #doc-overlay-text pre { background: #21262d; padding: 10px 14px; border-radius: 4px; overflow-x: auto; margin: 0.6em 0; }
    #doc-overlay-text pre code { background: none; padding: 0; }
    #doc-overlay-text blockquote { border-left: 3px solid #30363d; margin: 0.5em 0; padding-left: 1em; color: #8b949e; }

    /* ── Diagram Focus Mode overlay ────────────────────────────────────────── */
    /* Scoped to the left controller pane (#chat-col), so the document pane on the
       right stays visible while editing a diagram. */
    #diagram-focus-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: #0d1117;
      z-index: 50;
      flex-direction: column;
    }
    #diagram-focus-overlay.active { display: flex; }

    #diagram-focus-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 14px;
      background: #161b22;
      border-bottom: 1px solid #58a6ff;
      flex-shrink: 0;
    }
    #diagram-focus-label {
      font-size: 12px;
      font-weight: bold;
      color: #58a6ff;
      letter-spacing: 1px;
    }
    #diagram-focus-id {
      font-size: 11px;
      color: #79c0ff;
    }
    #diagram-focus-error {
      font-size: 11px;
      color: #f85149;
      background: #2d1117;
      border: 1px solid #f85149;
      border-radius: 4px;
      padding: 2px 8px;
      display: none;
    }
    #diagram-focus-error.visible { display: inline; }

    /* Transient toast popup */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      max-width: 80%;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 200;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #b6243b; border: 1px solid #f85149; }
    .toast.info  { background: #1f3a5f; border: 1px solid #58a6ff; }

    #diagram-focus-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 24px;
      min-height: 0;
    }
    #diagram-focus-render {
      width: 100%;
      max-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #diagram-focus-render svg {
      width: 100% !important;
      height: auto !important;
      max-height: calc(100vh - 80px);
    }

    /* ── Image search thumbnail strip ──────────────────────────────────────── */
    #image-search-strip {
      display: none;
      flex-direction: row;
      gap: 10px;
      padding: 10px 16px;
      background: #0d1117;
      border-top: 1px solid #30363d;
      overflow-x: auto;
      flex-shrink: 0;
      align-items: center;
    }
    #image-search-strip.visible { display: flex; }

    .img-thumb {
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
      border: 2px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .img-thumb:hover { border-color: #58a6ff; }
    .img-thumb.selected { border-color: #3fb950; }

    .img-thumb img {
      display: block;
      width: 100px;
      height: 80px;
      object-fit: contain;
      background: #21262d;
    }
    .img-thumb .img-num {
      position: absolute;
      top: 3px;
      left: 5px;
      font-size: 11px;
      font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.6);
      border-radius: 3px;
      padding: 1px 5px;
    }

    /* Mermaid diagrams inside the doc overlay */
    #doc-overlay-text .mermaid svg {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 8px auto;
    }

    #connect-btn {
      margin-left: auto;
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #connect-btn:hover { background: #30363d; }
    #connect-btn.active { border-color: #f85149; color: #f85149; }

    #mic-indicator {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
    }
    #mic-indicator.speaking {
      border-color: #3fb950;
      color: #3fb950;
      background: #0d2a13;
    }

    #voice-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      cursor: pointer;
      font-family: inherit;
      user-select: none;
      white-space: nowrap;
    }
    #voice-btn:hover { background: #30363d; }
    #voice-btn.active-cartesia {
      border-color: #a371f7;
      color: #a371f7;
      background: #1a0e2e;
    }
    #voice-btn.active-openai {
      border-color: #3fb950;
      color: #3fb950;
      background: #0d2a13;
    }
    #voice-btn.active-kokoro {
      border-color: #e3b341;
      color: #e3b341;
      background: #2a1f00;
    }
    #voice-btn.active-deepgram {
      border-color: #79c0ff;
      color: #79c0ff;
      background: #0d1f2a;
    }
    #voice-btn:disabled { opacity: 0.4; cursor: default; }

    #mute-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 4px;
      background: #161b22;
      border: 2px solid #30363d;
      color: #8b949e;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      user-select: none;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    #mute-btn:hover:not(:disabled) { border-color: #f85149; color: #f85149; }
    #mute-btn.muted {
      background: #2d1117;
      border-color: #f85149;
      color: #f85149;
    }
    #mute-btn:disabled { opacity: 0.4; cursor: default; }

    #model-select {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      font-family: inherit;
      cursor: pointer;
    }
    #model-select:hover:not(:disabled) { border-color: #58a6ff; color: #c9d1d9; }
    #model-select:disabled { opacity: 0.4; cursor: default; }
    #model-select option, #model-select optgroup { background: #161b22; color: #c9d1d9; }

    .pane-btn {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .pane-btn:hover { background: #30363d; color: #c9d1d9; }
    .pane-btn:disabled { opacity: 0.4; cursor: default; }

    #chat-header, #term-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      flex-shrink: 0;
    }
    #chat-header .pane-label, #term-header .pane-label {
      font-size: 10px;
      color: #484f58;
      letter-spacing: 1px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
    }

    #chat-col {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 40%;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    #divider {
      width: 5px;
      background: #30363d;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
      position: relative;
    }
    #divider:hover, #divider.dragging { background: #58a6ff; }

    #term-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #0d1117;
      overflow: hidden;
      position: relative;
    }

    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1f3d5c;
      border: 1px solid #1f6feb;
      color: #cae8ff;
    }

    .msg.bot {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
    }

    .msg.bot .sender {
      font-size: 10px;
      color: #3fb950;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .msg.user .sender {
      font-size: 10px;
      color: #58a6ff;
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-align: right;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      border: none;
      color: #484f58;
      font-size: 11px;
    }

    #input-row {
      border-top: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      gap: 8px;
    }

    #text-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
    }
    #text-input:focus { border-color: #58a6ff; }

    #send-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #send-btn:hover { background: #30363d; }

    /* scrollbar */
    #conversation::-webkit-scrollbar { width: 6px; }
    #conversation::-webkit-scrollbar-track { background: #0d1117; }
    #conversation::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* two-column main layout */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* column layout handled in the block above */

    #term-frame {
      flex: 1;
      min-height: 0;
      width: 100%;
      border: none;
      background: #000;
      display: block;
    }

    /* ── Mobile / narrow viewport: keep panes side-by-side (like desktop) ───── */
    @media (max-width: 768px), (orientation: portrait) and (max-width: 1024px) {
      body { height: 100dvh; }

      header {
        flex-wrap: wrap;
        padding: 8px 12px;
        gap: 8px;
      }
      header h1 { font-size: 12px; }

      /* Even 50/50 split by default on phones (desktop stays 40/60) */
      #chat-col { width: 50%; }

      .msg { max-width: 92%; font-size: 14px; }
      #input-row { padding: 8px 12px; }
      #conversation { padding: 12px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>VOICE CODING COCKPIT</h1>
  <span id="status-text">disconnected</span>
  <span id="mic-indicator">🎙 mic off</span>
  <button id="mute-btn" disabled title="Mute/unmute microphone (M)">🎙 Mute</button>
  <button id="voice-btn" disabled title="Cycle: Voice Off → Cartesia → OpenAI → Kokoro → Deepgram">🔇 Voice Off</button>
  <select id="model-select" disabled title="Switch LLM model">
    <optgroup label="OpenAI">
      <option value="gpt-4o-mini">gpt-4o-mini</option>
      <option value="gpt-4o">gpt-4o</option>
      <option value="gpt-4.1-mini">gpt-4.1-mini</option>
      <option value="gpt-4.1">gpt-4.1</option>
    </optgroup>
    <optgroup label="Anthropic">
      <option value="claude-haiku-4-5-20251001">claude-haiku-4-5</option>
      <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
      <option value="claude-opus-4-8">claude-opus-4-8</option>
    </optgroup>
    <optgroup label="Local (Ollama)">
      <option value="qwen2.5-coder:7b">qwen2.5-coder:7b</option>
    </optgroup>
  </select>
  <button class="pane-btn" id="reset-view-btn" title="Reset to 40/60 split">⊞ Reset view</button>
  <span id="doc-mode-indicator"></span>
  <button id="connect-btn">Connect</button>
</header>

<div id="main">

  <!-- left: conversation + input -->
  <div id="chat-col">
    <div id="chat-header">
      <span class="pane-label">CONTROLLER</span>
      <button class="pane-btn" id="clear-btn" title="Clear conversation">✕ Clear</button>
    </div>
    <div id="conversation">
      <div class="msg system">Connect to start — speak or type your instruction.</div>
    </div>
    <div id="input-row">
      <input id="text-input" type="text" placeholder="Type a message and press Enter…" disabled />
      <button id="send-btn" disabled>Send</button>
    </div>

    <!-- Diagram Focus Mode — covers only this left pane; document stays visible on the right -->
    <div id="diagram-focus-overlay">
      <div id="diagram-focus-header">
        <span id="diagram-focus-label">◈ DIAGRAM FOCUS</span>
        <span id="diagram-focus-id"></span>
        <span id="diagram-focus-error"></span>
        <button id="diagram-focus-exit-btn" class="pane-btn" style="margin-left:auto" title="Exit diagram focus mode">✕ Exit Focus</button>
      </div>
      <div id="diagram-focus-content">
        <div id="diagram-focus-render"></div>
      </div>
      <div id="image-search-strip"></div>
    </div>
  </div>

  <!-- drag handle -->
  <div id="divider"></div>

  <!-- right: live terminal via ttyd -->
  <div id="term-col">
    <div id="term-header">
      <span class="pane-label">TERMINAL · tmux cockpit</span>
      <button class="pane-btn" id="reset-btn" disabled title="Reset terminal session">↺ Reset</button>
    </div>
    <iframe id="term-frame" src="about:blank" allow="clipboard-read; clipboard-write" scrolling="yes"></iframe>
  </div>

  <!-- Documentation Mode — fullscreen overlay -->
  <div id="doc-mode-overlay">
    <div id="doc-overlay-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <span id="doc-mode-overlay-label">● DOCUMENTATION MODE</span>
        <span id="doc-mode-overlay-project"></span>
      </div>
      <button class="pane-btn" id="doc-exit-btn" style="margin-left: auto;" title="Exit documentation mode">✕ Exit</button>
    </div>
    <div id="doc-overlay-content">
      <div id="doc-overlay-text" class="empty">No content yet — discuss with the controller and ask it to write to the document.</div>
    </div>
  </div>

</div>

<!-- hidden audio element — needed so the browser lets WebRTC audio through, even if muted -->
<audio id="bot-audio" autoplay muted></audio>

<script>
  const statusDot    = document.getElementById('status-dot');
  const statusText   = document.getElementById('status-text');
  const connectBtn   = document.getElementById('connect-btn');
  const micLabel     = document.getElementById('mic-indicator');
  const muteBtn      = document.getElementById('mute-btn');
  const voiceBtn     = document.getElementById('voice-btn');
  const modelSelect  = document.getElementById('model-select');
  const conv         = document.getElementById('conversation');
  const textInput    = document.getElementById('text-input');
  const sendBtn      = document.getElementById('send-btn');
  const botAudio     = document.getElementById('bot-audio');
  const clearBtn     = document.getElementById('clear-btn');
  const resetBtn     = document.getElementById('reset-btn');
  const resetViewBtn = document.getElementById('reset-view-btn');
  const chatCol      = document.getElementById('chat-col');
  const termCol      = document.getElementById('term-col');
  const divider      = document.getElementById('divider');
  const mainEl       = document.getElementById('main');

  // ── Mermaid init ────────────────────────────────────────────────────────────
  // antiscript: allows <img> tags in node labels (needed for image embedding)
  // while still blocking <script> injection. Downgraded from 'strict' for Phase 2.5.
  // suppressErrorRendering: never inject Mermaid's default "bomb" error SVG into the page.
  mermaid.initialize({ startOnLoad: false, securityLevel: 'antiscript', theme: 'dark', suppressErrorRendering: true });

  // Render Mermaid into targetEl only if it parses & renders cleanly. On failure the
  // target is left untouched (no bomb graphic) and the function returns false.
  async function safeRenderMermaid(targetEl, source, id) {
    try {
      const ok = await mermaid.parse(source, { suppressErrors: true });
      if (ok === false) return false;
      const { svg } = await mermaid.render(id, source);
      if (targetEl) targetEl.innerHTML = svg;
      return true;
    } catch (e) {
      return false;
    }
  }

  // Small transient toast popup (bottom-center). kind: 'error' | 'info'.
  let _toastTimer = null;
  function showToast(text, kind = 'error') {
    let el = document.getElementById('toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = text;
    el.className = `toast ${kind} visible`;
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { el.classList.remove('visible'); }, 3500);
  }

  let pc = null;
  let dc = null;
  let pcId = null;
  let micStream = null;
  let micMuted = false;

  // Voice state: 'off' | 'cartesia' | 'openai' | 'kokoro' | 'deepgram'
  let voiceMode = 'off';
  const VOICE_CYCLE = ['off', 'cartesia', 'openai', 'kokoro', 'deepgram'];

  // Current bot bubble — accumulated across sentences in one turn
  let botBubbleBody = null;

  // ── UI helpers ─────────────────────────────────────────────────────────────

  function setStatus(state, text) {
    statusDot.className = state;
    statusText.textContent = text;
  }

  function addMsg(role, text) {
    // Remove the placeholder "Connect to start" system msg on first real msg
    const placeholder = conv.querySelector('.msg.system');
    if (placeholder) placeholder.remove();

    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = role === 'user' ? 'YOU' : 'CONTROLLER';
    wrap.appendChild(sender);

    const body = document.createElement('div');
    body.textContent = text;
    wrap.appendChild(body);

    conv.appendChild(wrap);
    conv.scrollTop = conv.scrollHeight;
    return body;
  }

  function startBotTurn() {
    // Create a new empty bot bubble; sentences will be appended into it
    const body = addMsg('bot', '');
    botBubbleBody = body;
  }

  function appendBotSentence(text) {
    if (!botBubbleBody) startBotTurn();
    const current = botBubbleBody.textContent;
    botBubbleBody.textContent = current ? current + ' ' + text.trim() : text.trim();
    conv.scrollTop = conv.scrollHeight;
  }

  function endBotTurn() {
    botBubbleBody = null;
  }

  function addSystem(text) {
    const el = document.createElement('div');
    el.className = 'msg system';
    el.textContent = text;
    conv.appendChild(el);
    conv.scrollTop = conv.scrollHeight;
  }

  const VOICE_LABELS = { off: '🔇 Voice Off', cartesia: '🔵 Cartesia', openai: '🟢 OpenAI', kokoro: '🟡 Kokoro', deepgram: '🔷 Deepgram' };

  function applyVoiceMode(mode, reason = '', announce = true) {
    voiceMode = mode;
    const enabled = mode !== 'off';
    voiceBtn.className = enabled ? `active-${mode}` : '';
    voiceBtn.textContent = VOICE_LABELS[mode] || '🔇 Voice Off';
    botAudio.muted = !enabled;
    if (announce && reason) addSystem(reason);
  }

  function sendVoiceMode(mode) {
    if (!dc || dc.readyState !== 'open') return;
    const enabled = mode !== 'off';
    dc.send(JSON.stringify({
      label: 'rtvi-ai', type: 'client-message', id: `tts-${Date.now()}`,
      data: { t: 'tts-toggle', d: { enabled } },
    }));
    if (enabled) {
      dc.send(JSON.stringify({
        label: 'rtvi-ai', type: 'client-message', id: `tts-prov-${Date.now()}`,
        data: { t: 'tts-provider', d: { provider: mode } },
      }));
    }
  }

  function sendDiagramRenderFailed(diagramId) {
    if (!dc || dc.readyState !== 'open') return;
    dc.send(JSON.stringify({
      label: 'rtvi-ai', type: 'client-message', id: `dgm-fail-${Date.now()}`,
      data: { t: 'diagram-render-failed', d: { diagram_id: diagramId || '' } },
    }));
  }

  // ── WebRTC connection ───────────────────────────────────────────────────────

  async function connect() {
    setStatus('connecting', 'connecting…');
    connectBtn.textContent = 'Connecting…';
    connectBtn.disabled = true;

    try {
      // Mic audio — send to server for Deepgram STT
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

      pc = new RTCPeerConnection();

      // Add mic track — this is the STT path; do NOT touch this
      for (const track of micStream.getTracks()) {
        pc.addTrack(track, micStream);
      }

      // Receive bot audio (TTS) — play it (muted by default in this UI)
      pc.ontrack = (evt) => {
        if (evt.track.kind === 'audio') {
          botAudio.srcObject = evt.streams[0];
        }
      };

      // Data channel — RTVI messages travel here
      dc = pc.createDataChannel('pipecat');

      dc.onopen = () => {
        setStatus('connected', 'connected');
        connectBtn.textContent = 'Disconnect';
        connectBtn.classList.add('active');
        connectBtn.disabled = false;
        textInput.disabled = false;
        sendBtn.disabled = false;
        resetBtn.disabled = false;
        voiceBtn.disabled = false;
        muteBtn.disabled = false;
        modelSelect.disabled = false;
        applyVoiceMode('off', '', false);
        sendVoiceMode('off');
        addSystem('Connected. Waiting for controller greeting…');
        termPolling = true;
        pollTerminal();
      };

      dc.onmessage = (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          handleRTVI(msg);
        } catch (_) {}
      };

      dc.onclose = () => onDisconnected('data channel closed');

      // SDP offer → server
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering to complete
      await new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') { resolve(); return; }
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') resolve();
        };
      });

      const resp = await fetch('/api/offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type,
        }),
      });

      if (!resp.ok) throw new Error(`Server returned ${resp.status}`);

      const answer = await resp.json();
      pcId = answer.pc_id;
      await pc.setRemoteDescription({ sdp: answer.sdp, type: answer.type });

    } catch (err) {
      setStatus('error', 'error');
      addSystem(`Connection failed: ${err.message}`);
      connectBtn.textContent = 'Connect';
      connectBtn.disabled = false;
      cleanup();
    }
  }

  function onDisconnected(reason) {
    setStatus('', 'disconnected');
    connectBtn.textContent = 'Connect';
    connectBtn.classList.remove('active');
    connectBtn.disabled = false;
    textInput.disabled = true;
    sendBtn.disabled = true;
    micLabel.className = '';
    micLabel.textContent = '🎙 mic off';
    resetBtn.disabled = true;
    voiceBtn.disabled = true;
    muteBtn.disabled = true;
    muteBtn.classList.remove('muted');
    muteBtn.textContent = '🎙 Mute';
    micMuted = false;
    modelSelect.disabled = true;
    applyVoiceMode('off', '', false);
    termPolling = false;
    termFrame.src = 'about:blank';
    addSystem(`Disconnected${reason ? ': ' + reason : ''}.`);
    cleanup();
  }

  function cleanup() {
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (dc) { try { dc.close(); } catch(_){} dc = null; }
    if (pc) { try { pc.close(); } catch(_){} pc = null; }
    pcId = null;
  }

  async function disconnect() {
    if (pcId) {
      try {
        await fetch('/api/offer', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pc_id: pcId, type: 'session.close' }),
        });
      } catch(_) {}
    }
    onDisconnected('user disconnected');
  }

  // ── RTVI message handler ────────────────────────────────────────────────────

  function handleRTVI(msg) {
    if (msg.label !== 'rtvi-ai') return;

    switch (msg.type) {
      case 'user-transcription':
        if (msg.data?.final) {
          addMsg('user', msg.data.text);
        }
        break;

      case 'bot-llm-started':
        startBotTurn();
        break;

      case 'bot-transcription':
        appendBotSentence(msg.data?.text || '');
        break;

      case 'bot-llm-stopped':
        endBotTurn();
        break;

      case 'user-started-speaking':
        micLabel.className = 'speaking';
        micLabel.textContent = '🎙 speaking…';
        break;

      case 'user-stopped-speaking':
        micLabel.className = '';
        micLabel.textContent = '🎙 listening';
        break;

      case 'bot-ready':
        addSystem('Controller ready.');
        break;

      case 'server-message':
        if (msg.data?.type === 'ping') {
          break; // keepalive — no action needed
        } else if (msg.data?.type === 'tts-status') {
          const reason = msg.data.reason || '';
          const shouldAnnounce = reason && reason !== 'Text-only mode is active.';
          const mode = msg.data.enabled ? (msg.data.provider || 'cartesia') : 'off';
          applyVoiceMode(mode, reason, shouldAnnounce);
        } else if (msg.data?.type === 'model-status') {
          const m = msg.data.model || '';
          if (m) modelSelect.value = m;
        } else if (msg.data?.type === 'doc-content-updated') {
          _applyDocContent(msg.data.content || '');
        } else if (msg.data?.type === 'doc-mode-entered') {
          docDispatch('doc-mode-entered', msg.data);
        } else if (msg.data?.type === 'doc-mode-exited') {
          docDispatch('doc-mode-exited', {});
        } else if (msg.data?.type === 'diagram-focus-entered') {
          docDispatch('diagram-focus-entered', msg.data);
        } else if (msg.data?.type === 'diagram-focus-exited') {
          _clearImageThumbnails();
          docDispatch('diagram-focus-exited', msg.data);
        } else if (msg.data?.type === 'diagram-focus-updated') {
          const render = document.getElementById('diagram-focus-render');
          const err = document.getElementById('diagram-focus-error');
          if (render && msg.data.mermaid_source) {
            err.classList.remove('visible'); err.textContent = '';
            const okP = safeRenderMermaid(render, msg.data.mermaid_source, `mermaid-upd-${Date.now()}`);
            okP.then(ok => {
              if (!ok && !msg.data.reverted) {
                // Bad diagram: don't show the bomb. Pop a toast and ask the server to roll back.
                showToast("That change didn't render — reverting to the previous version.", 'error');
                sendDiagramRenderFailed(msg.data.diagram_id);
              } else if (!ok && msg.data.reverted) {
                showToast("Couldn't render the reverted diagram either.", 'error');
              }
            });
          }
        } else if (msg.data?.type === 'image-search-results') {
          _showImageThumbnails(msg.data.images || []);
        } else if (msg.data?.type === 'image-search-clear') {
          _clearImageThumbnails();
        }
        break;

      default:
        break;
    }
  }

  // ── Send typed text via data channel as RTVI user message ──────────────────

  function sendText() {
    const text = textInput.value.trim();
    if (!text || !dc || dc.readyState !== 'open') return;

    // Send as RTVI user message so the server LLM processes it
    dc.send(JSON.stringify({
      label: 'rtvi-ai',
      type: 'user-llm-text',
      data: { text },
    }));

    addMsg('user', text);
    textInput.value = '';
  }

  // ── Terminal polling — load iframe once ttyd is ready ──────────────────────

  const termFrame = document.getElementById('term-frame');
  let termPolling = false;

  termFrame.addEventListener('load', () => {
    try {
      const doc = termFrame.contentDocument;
      if (!doc || !doc.head) return;
      const style = doc.createElement('style');
      style.textContent = `
        ::-webkit-scrollbar { width: 10px !important; height: 10px !important; }
        ::-webkit-scrollbar-track { background: #0d1117 !important; }
        ::-webkit-scrollbar-thumb { background: #30363d !important; border-radius: 5px !important; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58 !important; }
        .xterm-viewport { overflow-y: auto !important; }
      `;
      doc.head.appendChild(style);
    } catch (e) {
      // cross-origin or other error — ignore
    }
  });

  termFrame.addEventListener('mouseenter', () => {
    try { termFrame.contentWindow.focus(); } catch (_) {}
  });

  function pollTerminal() {
    if (!termPolling) return;
    fetch('/terminal')
      .then(r => {
        if (!termPolling) return;
        if (r.ok) {
          termFrame.src = 'about:blank';
          setTimeout(() => { if (termPolling) termFrame.src = '/terminal'; }, 50);
        } else {
          setTimeout(pollTerminal, 600);
        }
      })
      .catch(() => { if (termPolling) setTimeout(pollTerminal, 600); });
  }

  // ── Clear chat ──────────────────────────────────────────────────────────────

  clearBtn.addEventListener('click', () => {
    conv.innerHTML = '';
    botBubbleBody = null;
  });

  // ── Reset terminal ──────────────────────────────────────────────────────────

  resetBtn.addEventListener('click', async () => {
    resetBtn.disabled = true;
    resetBtn.textContent = '↺ …';
    try {
      await fetch('/api/reset-terminal', { method: 'POST' });
    } catch(_) {}
    termFrame.src = 'about:blank';
    setTimeout(() => {
      if (termPolling) termFrame.src = '/terminal';
      resetBtn.textContent = '↺ Reset';
      resetBtn.disabled = false;
    }, 1200);
  });

  // ── Draggable divider ───────────────────────────────────────────────────────

  function isStacked() {
    // Panes are always side-by-side (horizontal split), including on phones.
    return false;
  }

  function isNarrow() {
    return window.matchMedia('(max-width: 768px), (orientation: portrait) and (max-width: 1024px)').matches;
  }

  function setSplit(pct) {
    // pct = chat pane size as percentage of #main (0–100); width when side-by-side, height when stacked
    pct = Math.max(0, Math.min(100, pct));
    if (isStacked()) {
      chatCol.style.height = pct + '%';
      chatCol.style.width = '';
    } else {
      chatCol.style.width = pct + '%';
      chatCol.style.height = '';
    }
    chatCol.style.flex = 'none';
    termCol.style.flex = pct >= 100 ? '0' : '1';
  }

  resetViewBtn.addEventListener('click', () => setSplit(isNarrow() ? 50 : 40));

  // Re-apply split when orientation/viewport flips between stacked and side-by-side
  let lastStacked = isStacked();
  window.addEventListener('resize', () => {
    const nowStacked = isStacked();
    if (nowStacked !== lastStacked) {
      lastStacked = nowStacked;
      // Clear inline sizes so CSS defaults take over for the new layout
      chatCol.style.width = '';
      chatCol.style.height = '';
      chatCol.style.flex = '';
      termCol.style.flex = '';
    }
  });

  function startDrag(clientX, clientY) {
    divider.classList.add('dragging');
    const termFrame = termCol.querySelector('iframe');
    if (termFrame) termFrame.style.pointerEvents = 'none';
    document.body.style.userSelect = 'none';
    const rect = mainEl.getBoundingClientRect();
    const stacked = isStacked();

    function move(cx, cy) {
      const pct = stacked
        ? ((cy - rect.top) / rect.height) * 100
        : ((cx - rect.left) / rect.width) * 100;
      setSplit(pct);
    }
    function end() {
      divider.classList.remove('dragging');
      if (termFrame) termFrame.style.pointerEvents = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', end);
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', end);
      document.removeEventListener('touchcancel', end);
    }
    function onMouseMove(e) { move(e.clientX, e.clientY); }
    function onTouchMove(e) {
      if (!e.touches[0]) return;
      e.preventDefault();
      move(e.touches[0].clientX, e.touches[0].clientY);
    }
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', end);
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', end);
    document.addEventListener('touchcancel', end);
  }

  divider.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startDrag(e.clientX, e.clientY);
  });
  divider.addEventListener('touchstart', (e) => {
    if (!e.touches[0]) return;
    e.preventDefault();
    startDrag(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  // ── Event listeners ─────────────────────────────────────────────────────────

  connectBtn.addEventListener('click', () => {
    if (pc) { disconnect(); } else { connect(); }
  });

  sendBtn.addEventListener('click', sendText);

  function toggleMute() {
    if (muteBtn.disabled) return;
    micMuted = !micMuted;
    if (micStream) {
      micStream.getAudioTracks().forEach(t => { t.enabled = !micMuted; });
    }
    muteBtn.classList.toggle('muted', micMuted);
    muteBtn.textContent = micMuted ? '🔴 Muted' : '🎙 Mute';
    micLabel.textContent = micMuted ? '🎙 muted' : '🎙 listening';
    micLabel.className = micMuted ? '' : '';
  }

  muteBtn.addEventListener('click', toggleMute);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'm' || e.key === 'M') {

  voiceBtn.addEventListener('click', () => {
    const next = VOICE_CYCLE[(VOICE_CYCLE.indexOf(voiceMode) + 1) % VOICE_CYCLE.length];
    applyVoiceMode(next, '', false);
    sendVoiceMode(next);
  });

  modelSelect.addEventListener('change', () => {
    if (!dc || dc.readyState !== 'open') return;
    dc.send(JSON.stringify({
      label: 'rtvi-ai',
      type: 'client-message',
      id: `model-${Date.now()}`,

    }));

    dc.send(JSON.stringify({
      label: 'rtvi-ai',
      type: 'user-llm-text',

  // ── Doc Mode State-Reducer (Phase 1 + Phase 2) ─────────────────────────────
  // The server is authoritative for state; the browser reflects it via these events.

  const _docState = {
    mode: 'shell',       // 'shell' | 'doc_mode' | 'diagram_focus'
    projectSlug: null,
    version: null,
    activeDiagramId: null,
  };

  const _docReducers = {
    'doc-mode-entered': (state, payload) => ({
      ...state,
      mode: 'doc_mode',
      projectSlug: payload.project_slug,
      version: payload.version,
    }),
    'doc-mode-exited': (state, _payload) => ({
      ...state,
      mode: 'shell',
      projectSlug: null,
      version: null,
      activeDiagramId: null,
    }),
    'diagram-focus-entered': (state, payload) => ({
      ...state,
      mode: 'diagram_focus',
      activeDiagramId: payload.diagram_id,
    }),
    'diagram-focus-exited': (state, _payload) => ({
      ...state,
      mode: 'doc_mode',
      activeDiagramId: null,
    }),
  };

  function docDispatch(action, payload = {}) {
    const reducer = _docReducers[action];
    if (!reducer) return;
    Object.assign(_docState, reducer({ ..._docState }, payload));
    _applyDocUI(payload);
  }

  function _applyDocUI(payload = {}) {
    const indicator        = document.getElementById('doc-mode-indicator');
    const overlay          = document.getElementById('doc-mode-overlay');
    const overlayProject   = document.getElementById('doc-mode-overlay-project');
    const overlayText      = document.getElementById('doc-overlay-text');
    const termFrame        = document.getElementById('term-frame');
    const focusOverlay     = document.getElementById('diagram-focus-overlay');
    const focusIdEl        = document.getElementById('diagram-focus-id');
    const focusRender      = document.getElementById('diagram-focus-render');
    const focusError       = document.getElementById('diagram-focus-error');

    const inDocMode      = _docState.mode === 'doc_mode';
    const inFocusMode    = _docState.mode === 'diagram_focus';
    const inAnyDocState  = inDocMode || inFocusMode;

    // Terminal iframe: hide whenever we're in any doc/focus state
    if (termFrame) termFrame.style.visibility = inAnyDocState ? 'hidden' : 'visible';

    // Doc mode indicator chip in header
    if (indicator) {
      indicator.textContent = inAnyDocState
        ? `📄 Doc Mode — ${_docState.projectSlug} v${_docState.version}` : '';
      indicator.style.display = inAnyDocState ? 'inline' : 'none';
    }

    // Doc overlay: keep the document visible in BOTH doc_mode and diagram_focus, so the
    // user can read the document while editing a diagram in the left pane.
    if (overlay) {
      overlay.classList.toggle('active', inAnyDocState);
      if (overlayProject) {
        overlayProject.textContent = inAnyDocState
          ? `${_docState.projectSlug}  ·  version ${_docState.version}` : '';
      }
      if (overlayText && !inAnyDocState) {
        overlayText.innerHTML = 'No content yet — discuss with the controller and ask it to write to the document.';
        overlayText.classList.add('empty');
      }
    }

    // Diagram focus overlay
    if (focusOverlay) {
      focusOverlay.classList.toggle('active', inFocusMode);
      if (focusIdEl) focusIdEl.textContent = inFocusMode ? _docState.activeDiagramId : '';

      if (inFocusMode && payload.mermaid_source && focusRender) {
        focusError.classList.remove('visible');
        focusError.textContent = '';
        const id = `mermaid-focus-${Date.now()}`;
        safeRenderMermaid(focusRender, payload.mermaid_source, id).then(ok => {
          if (!ok) showToast("This diagram has a syntax error and can't be displayed.", 'error');
        });
      } else if (!inFocusMode && focusRender) {
        focusRender.innerHTML = '';
      }
    }
  }

  function _preprocessMermaidBlocks(html) {
    // marked wraps ```mermaid blocks as <pre><code class="language-mermaid">...</code></pre>
    // Replace with <div class="mermaid">...</div> for mermaid.run()
    return html.replace(
      /<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
      (_, src) => `<div class="mermaid">${src}</div>`
    );
  }

  async function _applyDocContent(content) {
    const overlayText = document.getElementById('doc-overlay-text');
    if (!overlayText) return;
    if (content && content.trim()) {
      const rawHtml = typeof marked !== 'undefined' ? marked.parse(content) : content;
      overlayText.innerHTML = _preprocessMermaidBlocks(rawHtml);
      overlayText.classList.remove('empty');
      // Render each mermaid block individually via mermaid.render() to ensure
      // re-rendering works on repeated doc updates (mermaid.run can skip nodes
      // it thinks are already processed)
      const mermaidNodes = overlayText.querySelectorAll('.mermaid');
      for (const node of mermaidNodes) {
        const src = node.textContent || '';
        if (!src.trim()) continue;
        try {
          const id = `mermaid-doc-${Date.now()}-${Math.random().toString(36).slice(2)}`;
          const { svg } = await mermaid.render(id, src);
          node.innerHTML = svg;
        } catch (err) {
          node.textContent = `Diagram error: ${err.message || err}`;
        }
      }
    } else {
      overlayText.textContent = 'No content yet — discuss with the controller and ask it to write to the document.';
      overlayText.classList.add('empty');
    }
  }

  function _showImageThumbnails(images) {
    const strip = document.getElementById('image-search-strip');
    if (!strip) return;
    strip.innerHTML = '';
    images.forEach(({ n, url }) => {
      const thumb = document.createElement('div');
      thumb.className = 'img-thumb';
      thumb.dataset.n = n;
      thumb.innerHTML = `<img src="${url}" alt="Image ${n}" loading="eager"/><span class="img-num">${n}</span>`;
      thumb.addEventListener('click', () => {
        // Clicking a thumbnail sends select_image via the data channel as a user message
        if (!dc || dc.readyState !== 'open') return;
        strip.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('selected'));
        thumb.classList.add('selected');
        dc.send(JSON.stringify({
          label: 'rtvi-ai',
          type: 'user-llm-text',
          data: { text: `select image ${n}` },
        }));
      });
      strip.appendChild(thumb);
    });
    strip.classList.add('visible');
  }

  function _clearImageThumbnails() {
    const strip = document.getElementById('image-search-strip');
    if (!strip) return;
    strip.innerHTML = '';
    strip.classList.remove('visible');
  }
