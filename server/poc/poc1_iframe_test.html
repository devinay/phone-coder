<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PoC 1 — Excalidraw iframe PASS/FAIL test</title>
  <style>
    body { font: 14px/1.5 monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    #toolbar {
      padding: 8px 12px; background: #1a1a2e; color: #eee;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    button {
      padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer;
      background: #4a90e2; color: #fff; font: inherit;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #log {
      padding: 8px 12px; background: #111; color: #0f0; flex: 0 0 140px;
      overflow-y: auto; font-size: 12px;
    }
    iframe { flex: 1; border: none; }
  </style>
</head>
<body>
  <div id="toolbar">
    <strong>PoC 1 — Excalidraw iframe</strong>
    <button id="btn-scene" disabled>Get Scene (check rectangle)</button>
    <button id="btn-fullscreen">Fullscreen</button>
    <span id="ready-badge" style="color:#f90">⏳ waiting for editor</span>
  </div>
  <div id="log">Open editor, draw a rectangle, then click "Get Scene"…</div>
  <iframe id="editor" src="/editor" sandbox="allow-scripts allow-same-origin"></iframe>

  <script>
    const log = document.getElementById("log");
    const iframe = document.getElementById("editor");
    const btnScene = document.getElementById("btn-scene");
    const badge = document.getElementById("ready-badge");

    function emit(msg, ok) {
      const line = document.createElement("div");
      line.style.color = ok === true ? "#0f0" : ok === false ? "#f44" : "#aaa";
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    window.addEventListener("message", (e) => {
      if (e.source !== iframe.contentWindow) return;
      const msg = e.data;

      if (msg.type === "editor-ready") {
        badge.textContent = "✅ editor ready";
        badge.style.color = "#0f0";
        btnScene.disabled = false;
        emit("editor-ready received", null);
      }

      if (msg.type === "scene") {
        const elements = msg.scene.elements || [];
        emit(`get-scene returned ${elements.length} element(s)`, null);
        const rect = elements.find(el => el.type === "rectangle");
        if (rect) {
          emit("PASS ✅ — scene contains a rectangle element", true);
        } else {
          emit("FAIL ❌ — no rectangle element found (draw one first)", false);
        }
      }
    });

    btnScene.addEventListener("click", () => {
      iframe.contentWindow.postMessage({ type: "get-scene" }, "*");
      emit("→ sent get-scene", null);
    });

    document.getElementById("btn-fullscreen").addEventListener("click", () => {
      iframe.requestFullscreen?.() || iframe.webkitRequestFullscreen?.();
    });

    // Detect reload-recovery: iframe still present after parent navigation
    window.addEventListener("beforeunload", () => {
      sessionStorage.setItem("poc1-overlay-active", "1");
    });
    if (sessionStorage.getItem("poc1-overlay-active")) {
      sessionStorage.removeItem("poc1-overlay-active");
      const iframePresent = !!document.getElementById("editor");
      emit(iframePresent
        ? "FAIL ❌ — iframe still in DOM after reload (overlay not cleaned up)"
        : "PASS ✅ — iframe absent after reload", !iframePresent);
    }
  </script>
</body>
</html>
